<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Tabela de Jogos</title>
<link rel="stylesheet" href="style.css">

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f4f6f9;
}

header{
    background:#0d1b2a;
    color:white;
    text-align:center;
    padding:20px;
}

h1{
    color:#fca311;
}

table{
    width:90%;
    margin:30px auto;
    background:white;
    border-collapse:collapse;
}

th{
    background:#fca311;
    padding:15px;
}

td{
    padding:15px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

.voltar{
    margin-left:5%;
    background:#fca311;
    padding:10px 20px;
    border-radius:8px;
    text-decoration:none;
    color:black;
}

</style>
</head>
<body>

<header>
    <h1>📅 Tabela de Jogos</h1>
</header>

<table>

<tr>
    <th>Data</th>
    <th>Horário</th>
    <th>Partida</th>
</tr>

<tr>
    <td>20/06</td>
    <td>09:00</td>
    <td>3ºA x 3ºB</td>
</tr>

<tr>
    <td>20/06</td>
    <td>10:00</td>
    <td>2ºA x 2ºC</td>
</tr>

<tr>
    <td>21/06</td>
    <td>09:00</td>
    <td>1ºA x 1ºB</td>
</tr>

</table>

<a href="index.html" class="voltar">⬅ Voltar</a>

</body>
</html>
