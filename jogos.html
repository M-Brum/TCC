<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogos</title>
<link rel="stylesheet" href="style.css">
<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f6f9;
}

header{
    background:#0d1b2a;
    color:white;
    text-align:center;
    padding:20px;
}

h1{
    color:#fca311;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:30px;
}

.jogo{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,.1);
}

.voltar{
    display:inline-block;
    margin-top:20px;
    background:#fca311;
    color:black;
    padding:10px 20px;
    border-radius:8px;
    text-decoration:none;
}

</style>
</head>
<body>

<header>
    <h1>⚽ Jogos</h1>
</header>

<div class="container">

    <div class="jogo">
        <h2>3ºA x 3ºB</h2>
        <p>Data: 20/06/2026</p>
        <p>Horário: 09:00</p>
    </div>

    <div class="jogo">
        <h2>2ºA x 2ºC</h2>
        <p>Data: 20/06/2026</p>
        <p>Horário: 10:00</p>
    </div>

    <a href="index.html" class="voltar">⬅ Voltar</a>

</div>

</body>
</html>
