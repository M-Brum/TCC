<!DOCTYPE html>
<html lang="pt-br">
<head>

<title>Classificação</title>
<link rel="stylesheet" href="style.css">

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f4f6f9;
}

header{
    background:#0d1b2a;

    text-align:center;
    padding:20px;
}

}

table{
    width:90%;

}

    background:#fca311;

}

    padding:15px;

    border-bottom:1px solid #ddd;
}

.voltar{
    margin-left:5%;
    background:#fca311;
    padding:10px 20px;
    text-decoration:none;
    color:black;
    border-radius:8px;
}

<table>

        <td>12</td>
